# ci.yml — GitHub Actions CI 워크플로우
# Week 13 — CI/CD & OSS 라이선스
# 위치: .github/workflows/ci.yml
#
# 동작 흐름:
#   1. main 브랜치에 Push 또는 PR 생성 시 자동 실행
#   2. Ubuntu 가상머신에서 JDK 21을 설치
#   3. Gradle을 사용하여 프로젝트 빌드 및 테스트
#   4. 테스트 결과를 아티팩트로 업로드 (실패 시에도 확인 가능)

name: Spring Boot CI  # GitHub Actions 탭에 표시되는 워크플로우 이름

# ── 트리거(Trigger): 언제 실행할 것인가? ──
on:
  push:
    branches: [ "main" ]       # main 브랜치에 Push할 때
  pull_request:
    branches: [ "main" ]       # main 브랜치로 PR을 생성할 때

# ── 작업(Jobs): 무엇을 실행할 것인가? ──
jobs:
  build-and-test:              # Job 이름 (자유롭게 지정)
    runs-on: ubuntu-latest     # 실행 환경: Ubuntu 최신 버전 가상머신

    # ── 단계(Steps): 어떤 순서로 실행할 것인가? ──
    steps:
      # 1단계: 소스 코드 체크아웃
      # - GitHub 저장소의 코드를 가상머신에 다운로드
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # 2단계: JDK 21 설치
      # - Eclipse Temurin JDK를 설치하고 Gradle 캐싱 활성화
      - name: JDK 21 설치
        uses: actions/setup-java@v4
        with:
          java-version: '21'           # Java 버전 (프로젝트와 동일하게)
          distribution: 'temurin'      # Eclipse Temurin JDK 사용
          cache: gradle                # Gradle 의존성 캐싱 (빌드 속도 향상)

      # 3단계: Gradle Wrapper 실행 권한 부여
      # - Linux/macOS에서 gradlew 파일에 실행 권한이 필요
      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      # 4단계: Gradle 빌드 및 테스트 실행
      # - 컴파일 + 단위 테스트를 함께 수행
      # - SPRING_PROFILES_ACTIVE=test: H2 인메모리 DB 사용 (MySQL 없이 CI 실행)
      # - Week 13: @ActiveProfiles("test") 어노테이션과 함께 application-test.yml 적용
      - name: Gradle 빌드 및 테스트
        run: ./gradlew build
        env:
          SPRING_PROFILES_ACTIVE: test   # H2 인메모리 DB로 테스트 (MySQL 불필요)

      # 5단계: 테스트 결과 업로드
      # - if: always()로 빌드 실패 시에도 테스트 결과를 확인할 수 있음
      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/test
