<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{greeting.title}">IoC/DI 학습 — 인사말</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .message-box { background: #e8f4f8; border-left: 4px solid #3498db; padding: 15px 20px; margin: 20px 0; border-radius: 0 4px 4px 0; font-size: 1.2em; }
        .info-box { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 4px; margin: 15px 0; }
        .info-box code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
        .form-row { display: flex; gap: 10px; margin: 20px 0; }
        input[type=text] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        button:hover { background: #2980b9; }
        .back-link { margin-top: 20px; }
        .back-link a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="#{greeting.heading}">Week 04 — IoC/DI 학습: 인사말 서비스</h1>

    <!-- 인사말 출력 -->
    <div class="message-box">
        <span th:if="${message}" th:text="${message}">인사말이 여기에 표시됩니다.</span>
        <span th:unless="${message}" th:text="#{greeting.placeholder}">인사말이 여기에 표시됩니다.</span>
    </div>

    <!-- 현재 주입된 구현체 정보 -->
    <div class="info-box">
        <strong th:text="#{greeting.service.label}">현재 주입된 구현체:</strong>
        <code th:text="${serviceClass}">GreetingService</code>
        <br><br>
        <strong th:text="#{greeting.experiment.label}">학습 실험:</strong>
        <ul>
            <li><code>KoreanGreetingService</code>의 <code>@Primary</code>를 제거하고</li>
            <li><code>EnglishGreetingService</code>에 <code>@Primary</code>를 추가해보세요</li>
            <li>이 Controller 코드는 수정 없이 출력 언어가 바뀝니다!</li>
        </ul>
    </div>

    <!-- 이름 입력 폼 -->
    <form th:action="@{/greeting}" method="get">
        <div class="form-row">
            <input type="text" name="name" th:value="${name}" th:placeholder="#{greeting.name.placeholder}">
            <button type="submit" th:text="#{greeting.greet.button}">인사하기</button>
        </div>
    </form>

    <div class="back-link">
        <a th:href="@{/}" th:text="#{nav.home}">← 홈으로 돌아가기</a>
    </div>
</div>
</body>
</html>
