# application-h2.yml — H2 인메모리 DB 프로파일
# 실행: ./gradlew bootRun --args='--spring.profiles.active=h2'
# MySQL 설치 없이 바로 실행 가능 (개발/테스트용)

spring:
  datasource:
    url: jdbc:h2:mem:swframework;MODE=MYSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 웹 콘솔 활성화 (http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

  # 서버 시작 시 schema.sql 자동 실행
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-h2.sql
      data-locations: classpath:sql/data.sql
