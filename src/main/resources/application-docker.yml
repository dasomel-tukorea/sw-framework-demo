# application-docker.yml — Docker 환경 전용 설정 파일
# Week 12 — Docker 컨테이너화 배포
# 활성화: java -jar -Dspring.profiles.active=docker app.jar

spring:
  datasource:
    # DB_HOST 환경변수가 없으면 host.docker.internal 사용 (호스트 머신의 DB 접속)
    url: jdbc:mysql://${DB_HOST:host.docker.internal}:3306/swframework?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASS:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  thymeleaf:
    cache: true  # 운영 환경에서는 캐시 활성화

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: kr.ac.tukorea.swframework.dto
  configuration:
    map-underscore-to-camel-case: true
